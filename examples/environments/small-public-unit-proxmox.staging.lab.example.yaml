environment:
  id: small-public-unit-proxmox-staging-lab
  description: >
    Local staging lab for http_api connectors. Used by scripts/run_staging_http_lab.py
    with an embedded Proxmox/PBS API stub (127.0.0.1). For real staging endpoints copy
    small-public-unit-proxmox.staging.example.yaml outside git and use --env with secrets.
  profile: tecrax

  targets:
    all_critical_vms:
      type: group
      members:
        - vm-zabbix-01
        - vm-pbs-01

  connectors:
    proxmox:
      enabled: true
      backend: http_api
      base_url: http://127.0.0.1:0
      timeout_seconds: 10
      actions:
        list_vms:
          method: GET
          path: /proxmox/vms
          unwrap: vms
    pbs:
      enabled: true
      backend: http_api
      base_url: http://127.0.0.1:0
      timeout_seconds: 20
      actions:
        list_snapshots:
          method: GET
          path: /pbs/snapshots
          unwrap: snapshots

  safety:
    default_mode: dry_run
    apply_requires_govengine: true
    secrets_source: external
    max_concurrent_operations: 1
    target_lock_enabled: true
    maintenance_windows:
      - timezone: UTC
        start: "00:00"
        end: "23:59"

  policy_pack:
    policy_id: rexecop-connectors
    version: "2026-06-20"
    rules:
      - rule_id: allow-check-backup-status-operation
        effect: allow
        conditions:
          action.category: operation
          action.mode: read
          action.intent: check_backup_status
        reason_code: check_backup_status_allowed
      - rule_id: allow-read-connectors
        effect: allow
        conditions:
          action.category: connector
          action.mode: read
        reason_code: read_connector_allowed
      - rule_id: deny-ssh-critical
        effect: deny
        conditions:
          action.backend: ssh_readonly
          resource.criticality: critical
        reason_code: ssh_denied_on_critical_target
      - rule_id: deny-mutating-connectors
        effect: deny
        conditions:
          action.mode: mutating
        reason_code: mutating_connector_denied
