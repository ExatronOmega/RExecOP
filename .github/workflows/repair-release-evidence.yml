name: Repair release evidence

on:
  workflow_dispatch:
    inputs:
      version:
        description: Published RExecOp version to verify
        required: true
      source_commit:
        description: Exact 40-character source commit for that publication
        required: true
      supersedes:
        description: Optional prior public line superseded by this evidence
        required: false
        default: ""

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  repair-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Validate release tag source binding
        env:
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          VERSION: ${{ inputs.version }}
        run: |
          test "$SOURCE_COMMIT" = "$(printf '%s' "$SOURCE_COMMIT" | grep -E '^[0-9a-f]{40}$')"
          release_tag="v${VERSION}"
          git check-ref-format "refs/tags/${release_tag}"
          git fetch --force origin "refs/tags/${release_tag}:refs/tags/${release_tag}"
          test "$(git rev-list -n 1 "${release_tag}")" = "$SOURCE_COMMIT"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Download exact public wheel and sdist
        run: |
          mkdir -p dist .release-train
          python -m pip download --no-deps \
            --dest dist "rexecop==${{ inputs.version }}"
          python -m pip download --no-deps --no-binary rexecop \
            --dest dist "rexecop==${{ inputs.version }}"

      - name: Install supply-chain tooling
        run: python -m pip install --upgrade pip pip-audit cyclonedx-bom

      - name: Rebuild CycloneDX SBOM from the exact public wheel
        run: python scripts/validate_supply_chain_gate.py dist --version "${{ inputs.version }}"

      - name: Attest wheel, sdist, and CycloneDX SBOM
        id: release_subject_attestation
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.cdx.json

      - name: Re-run public-index smoke and create evidence
        run: |
          python scripts/validate_public_index_release_smoke.py \
            --version "${{ inputs.version }}" \
            --dist-dir dist \
            --sbom "dist/rexecop-${{ inputs.version }}.cdx.json" \
            --attestation-id "${{ steps.release_subject_attestation.outputs.attestation-id }}" \
            --attestation-url "${{ steps.release_subject_attestation.outputs.attestation-url }}" \
            --evidence-output ".release-train/rexecop-release-evidence-${{ inputs.version }}.json" \
            --source-commit "${{ inputs.source_commit }}" \
            --supersedes "${{ inputs.supersedes }}" \
            --write-evidence

      - name: Upload repaired evidence artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rexecop-release-evidence-${{ inputs.version }}
          path: |
            .release-train/rexecop-release-evidence-${{ inputs.version }}.json
            dist/rexecop-${{ inputs.version }}.cdx.json
          if-no-files-found: error

      - name: Attest repaired evidence
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a
        with:
          subject-path: .release-train/rexecop-release-evidence-${{ inputs.version }}.json

      - name: Persist repaired GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          release_tag="v${VERSION}"
          evidence=".release-train/rexecop-release-evidence-${VERSION}.json"
          sbom="dist/rexecop-${VERSION}.cdx.json"
          if gh release view "$release_tag" >/dev/null 2>&1; then
            gh release upload "$release_tag" "$evidence" "$sbom" --clobber
          else
            gh release create "$release_tag" "$evidence" "$sbom" \
              --verify-tag \
              --title "RExecOP ${VERSION}" \
              --generate-notes
          fi
